# ============================================================
#  Північна Дивізія — Nginx Security Config
#  Include this in your server {} block
# ============================================================

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    root /var/www/pd-site;
    index index.html;

    # ── SSL (Let's Encrypt recommended) ──
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── REDIRECT HTTP → HTTPS ──
    # (put in a separate server{} block)

    # ── SECURITY HEADERS ──
    add_header X-Frame-Options           "DENY"                              always;
    add_header X-Content-Type-Options    "nosniff"                           always;
    add_header X-XSS-Protection          "1; mode=block"                     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https: data:; connect-src 'none'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
        always;

    # ── HIDE SERVER VERSION ──
    server_tokens off;

    # ── BLOCK SENSITIVE FILES ──
    location ~* \.(htaccess|htpasswd|env|git|log|sh|bak|sql|swp)$ {
        deny all;
        return 404;
    }

    # Block old admin.html
    location = /admin.html {
        deny all;
        return 404;
    }

    # ── RATE LIMITING — brute-force protection ──
    # Limit: 10 req/sec per IP globally, burst 20
    limit_req_zone $binary_remote_addr zone=global:10m rate=10r/s;
    limit_req zone=global burst=20 nodelay;

    # Tighter limit for admin: 2 req/sec per IP, burst 5
    location ~* admin_.*\.html {
        limit_req zone=admin_zone burst=5 nodelay;
        try_files $uri =404;
    }
    limit_req_zone $binary_remote_addr zone=admin_zone:10m rate=2r/s;

    # ── PREVENT DIRECTORY LISTING ──
    autoindex off;

    # ── CACHE STATIC ASSETS ──
    location ~* \.(jpg|jpeg|png|svg|gif|ico|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── GZIP ──
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    # ── MAIN LOCATION ──
    location / {
        try_files $uri $uri/ =404;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$host$request_uri;
}
